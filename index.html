<body>

<!-- 🔵 SCREEN 1: LOGIN -->
<div id="loginScreen">
  <h1>FROSTFIRE</h1>

  <button id="googleBtn">Login with Google</button>
  <button id="guestBtn">Play as Guest</button>
</div>

<!-- 🟢 SCREEN 2: MODE SELECT -->
<div id="menuScreen" class="hidden">
  <h2>Select Mode</h2>

  <button id="offlineBtn">Play Offline</button>
  <button id="onlineBtn">Play Online</button>

  <div id="roleSelect" class="hidden">
    <h3>Choose Role</h3>
    <button id="chooseFire">🔥 Fire</button>
    <button id="chooseIce">❄ Ice</button>
  </div>
</div>

<!-- 🔴 SCREEN 3: GAME -->
<div id="gameScreen" class="hidden">
  <h2 id="turn"></h2>
  <h3 id="scoreBoard"></h3>

  <canvas id="gameCanvas"></canvas>

  <div id="winModal" class="hidden">
    <h2 id="winnerText"></h2>
    <button id="playAgainBtn">Play Again</button>
    <button id="mainMenuBtn">Main Menu</button>
    <button id="rematchBtn">Rematch</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
